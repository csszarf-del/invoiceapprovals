<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SkyHi">
<meta name="theme-color" content="#ffffff">
<title>SkyHi Management</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow-x:hidden;overscroll-behavior-y:contain}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;max-width:100vw;overscroll-behavior-y:contain}
.header{background:#fff;padding:16px 20px;display:flex;align-items:center;border-bottom:1px solid #ebebeb;position:sticky;top:0;z-index:10}
.header h1{font-size:20px;font-weight:800;flex:1}
.badge{background:#ff3b30;color:#fff;font-size:13px;font-weight:700;padding:4px 10px;border-radius:20px;margin-right:8px}
.header-refresh{background:none;border:none;font-size:20px;cursor:pointer;padding:4px 8px;color:#1D9E75}
.header-refresh.spinning{animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.module-switch{display:flex;background:#fff;border-bottom:1px solid #ebebeb;padding:8px 16px}
.mod-btn{flex:1;padding:10px;border:none;background:none;font-size:14px;font-weight:700;color:#999;cursor:pointer;border-radius:12px;text-align:center}
.mod-btn.active{background:#f0f0f0;color:#1a1a1a}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #ebebeb;display:flex;justify-content:center;align-items:center;gap:4px;padding:8px 8px calc(8px + env(safe-area-inset-bottom));z-index:20}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;padding:8px 12px;border-radius:14px;color:#999;font-size:11px;font-weight:600;min-width:60px}
.nav-btn.active{background:#f0faf5;color:#1D9E75}
.nav-icon{font-size:22px;line-height:1}
.login-wrap{min-height:100vh;display:flex;flex-direction:column;width:100%}
.login-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px;gap:20px;width:100%}
.login-body h2{font-size:28px;font-weight:800}
.login-body p{font-size:16px;color:#888;margin-top:-8px}
.login-form{width:100%;max-width:400px;display:flex;flex-direction:column;gap:14px}
.input-group{display:flex;flex-direction:column;gap:6px}
.input-label{font-size:14px;font-weight:600;color:#555}
.input-field{width:100%;padding:16px;border:1.5px solid #ebebeb;border-radius:14px;font-size:16px;font-family:inherit;color:#1a1a1a;background:#fff}
.input-field:focus{outline:none;border-color:#1D9E75}
.input-field::placeholder{color:#bbb}
.btn-login{width:100%;padding:18px;background:#1D9E75;color:#fff;border:none;border-radius:14px;font-size:18px;font-weight:800;cursor:pointer;margin-top:6px}
.btn-login:active{background:#178a64}
.btn-login:disabled{background:#ccc;cursor:not-allowed}
.login-error{background:#fff0f0;color:#ff3b30;padding:12px 16px;border-radius:12px;font-size:14px;font-weight:600;text-align:center;display:none}
.page{padding:16px 16px 110px;width:100%}
.user-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;background:#fff;padding:16px;border-radius:20px;box-shadow:0 1px 4px rgba(0,0,0,0.06);width:100%}
.user-av{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;flex-shrink:0}
.user-name{font-size:17px;font-weight:800}
.user-sub{font-size:13px;color:#888;margin-top:2px}
.signout{margin-left:auto;font-size:13px;color:#888;background:#f5f5f5;border:none;border-radius:10px;padding:9px 14px;cursor:pointer;font-weight:600;white-space:nowrap}
.card{background:#fff;border-radius:22px;padding:20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,0.06);width:100%}
.card-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.card-vendor{font-size:18px;font-weight:800;flex:1;padding-right:10px;line-height:1.3}
.card-amount{font-size:20px;font-weight:800;white-space:nowrap}
.card-meta{font-size:14px;color:#999;margin-bottom:4px}
.card-prop{font-size:15px;color:#666;margin-bottom:14px}
.card-note{font-size:14px;color:#999;font-style:italic;margin-bottom:12px;white-space:pre-line;word-break:break-word}
.card-assign{font-size:13px;color:#3b5bdb;margin-bottom:10px;font-weight:600}
.btn-row{display:flex;flex-direction:column;gap:10px;width:100%}
.btn-approve{width:100%;padding:18px;background:#1D9E75;color:#fff;border:none;border-radius:14px;font-size:18px;font-weight:800;cursor:pointer}
.btn-approve:active{background:#178a64}
.btn-reject{width:100%;padding:18px;background:#fff;color:#ff3b30;border:1.5px solid #ebebeb;border-radius:14px;font-size:18px;font-weight:800;cursor:pointer}
.btn-reject:active{background:#fff0f0}
.btn-pdf{width:100%;padding:14px;background:#f5f5f5;color:#555;border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;display:block}
.btn-assign{width:100%;padding:14px;background:#eef3ff;color:#3b5bdb;border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;text-align:center}
.btn-action{width:100%;padding:14px;border:1.5px solid #ebebeb;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;text-align:center;background:#fff;color:#1a1a1a}
.btn-action:active{background:#f5f5f5}
.btn-pay{width:100%;padding:18px;background:#fff;color:#1D9E75;border:2px solid #1D9E75;border-radius:14px;font-size:18px;font-weight:800;cursor:pointer;margin-top:12px}
.btn-pay:active{background:#1D9E75;color:#fff}
.pill{display:inline-flex;align-items:center;font-size:12px;font-weight:700;padding:5px 12px;border-radius:20px;gap:4px}
.pill-green{background:#e8faf3;color:#1D9E75}
.pill-red{background:#fff0f0;color:#ff3b30}
.pill-blue{background:#eef3ff;color:#3b5bdb}
.pill-yellow{background:#fef9c3;color:#ca8a04}
.pill-orange{background:#fff7ed;color:#ea580c}
.pill-gray{background:#f5f5f5;color:#666}
.pri-emergency{color:#ff3b30;font-weight:700}
.pri-urgent{color:#ea580c;font-weight:700}
.pri-high{color:#ca8a04;font-weight:700}
.pri-medium{color:#3b5bdb;font-weight:600}
.pri-low{color:#888;font-weight:600}
.summary{background:#fff;border-radius:20px;padding:18px;margin-bottom:16px;display:flex;flex-wrap:wrap;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.summary-item{flex:1;text-align:center;min-width:30%}
.summary-val{font-size:22px;font-weight:800}
.summary-lbl{font-size:11px;color:#999;margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px}
.filters{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.chip{padding:10px 18px;background:#fff;border:1.5px solid #ebebeb;border-radius:20px;font-size:14px;font-weight:600;color:#888;cursor:pointer;white-space:nowrap}
.chip.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.approved-tag{font-size:14px;color:#888;margin-top:8px}
.empty{text-align:center;padding:80px 20px}
.empty-icon{font-size:56px;margin-bottom:16px}
.empty-title{font-size:22px;font-weight:800;margin-bottom:8px}
.empty-sub{font-size:16px;color:#aaa}
.loading{text-align:center;padding:80px 20px;font-size:17px;color:#aaa}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:flex-end;z-index:50}
.sheet{background:#fff;border-radius:28px 28px 0 0;padding:28px 20px calc(40px + env(safe-area-inset-bottom));width:100%;max-height:85vh;overflow-y:auto}
.sheet-title{font-size:22px;font-weight:800;margin-bottom:6px}
.sheet-sub{font-size:16px;color:#888;margin-bottom:20px}
.sheet textarea,.sheet input,.sheet select{width:100%;border:1.5px solid #ebebeb;border-radius:16px;padding:16px;font-size:16px;font-family:inherit;resize:none;color:#1a1a1a;margin-bottom:12px;background:#fff;-webkit-appearance:none;appearance:none}
.sheet textarea{height:100px}
.sheet textarea:focus,.sheet input:focus,.sheet select:focus{outline:none;border-color:#1a1a1a}
.sheet-btns{display:flex;gap:10px}
.btn-confirm-approve{flex:1;padding:18px;background:#1D9E75;color:#fff;border:none;border-radius:14px;font-size:18px;font-weight:800;cursor:pointer}
.btn-confirm-reject{flex:1;padding:18px;background:#fff0f0;color:#ff3b30;border:none;border-radius:14px;font-size:18px;font-weight:800;cursor:pointer}
.btn-cancel{padding:18px 20px;background:#f5f5f5;color:#888;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer}
.settings-card{background:#fff;border-radius:20px;padding:20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.settings-title{font-size:16px;font-weight:700;margin-bottom:14px}
.settings-row{display:flex;flex-direction:column;gap:10px}
.btn-save{width:100%;padding:16px;background:#1D9E75;color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;margin-top:6px}
.btn-save:active{background:#178a64}
.pin-msg{padding:12px;border-radius:12px;font-size:14px;font-weight:600;text-align:center;margin-top:10px;display:none}
.pin-ok{background:#e8faf3;color:#1D9E75}
.pin-err{background:#fff0f0;color:#ff3b30}
.user-pick{padding:14px;border:1.5px solid #ebebeb;border-radius:14px;background:#fff;cursor:pointer;font-size:15px;font-weight:600;text-align:left;width:100%;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.user-pick:active{background:#f5f5f5}
.user-pick .pick-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;background:#dbeafe;color:#1d4ed8;flex-shrink:0}
.dash-card{background:#fff;border-radius:20px;padding:18px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.dash-title{font-size:15px;font-weight:700;margin-bottom:12px;color:#555}
.dash-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:14px}
.dash-row:last-child{border-bottom:none}
.dash-label{color:#666;flex:1;word-break:break-word;padding-right:8px}
.dash-value{font-weight:700;flex-shrink:0}
</style>
</head>
<body>

<div id="login-view" class="login-wrap">
  <div class="header"><h1>🏢 SkyHi Management</h1></div>
  <div class="login-body">
    <img src="skyhi_logo.png" style="width:200px;height:auto" alt="Sky High Management">
    <h2>Sign In</h2>
    <p>Enter your email and PIN</p>
    <div class="login-form">
      <div class="input-group">
        <label class="input-label">Email / Username</label>
        <input class="input-field" id="login-email" type="text" placeholder="you@skyhimanagement.com" autocomplete="email" autocapitalize="none">
      </div>
      <div class="input-group">
        <label class="input-label">PIN</label>
        <input class="input-field" id="login-pin" type="password" inputmode="numeric" placeholder="8-digit PIN" maxlength="8" autocomplete="off">
      </div>
      <div class="login-error" id="login-error"></div>
      <button class="btn-login" id="btn-login" onclick="handleLogin()">Sign In</button>
    </div>
  </div>
</div>

<div id="main-view" style="display:none;width:100%">
  <div class="header">
    <h1 id="header-title">SkyHi Management</h1>
    <span class="badge" id="header-badge" style="display:none"></span>
    <button class="header-refresh" id="refresh-btn" onclick="doRefresh()">↻</button>
  </div>
  <div class="module-switch" id="module-switch" style="display:none">
    <button class="mod-btn active" id="mod-invoices" onclick="switchModule('invoices')">📄 Invoices</button>
    <button class="mod-btn" id="mod-maintenance" onclick="switchModule('maintenance')">🔧 Maintenance</button>
  </div>
  <div class="page" id="main-content"></div>
  <div class="bottom-nav" id="bottom-nav"></div>
</div>

<div class="overlay" id="overlay" style="display:none" onclick="overlayClick(event)">
  <div class="sheet" id="action-sheet"></div>
</div>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/https://script.google.com/macros/s/AKfycbwxvn9vAxL0X6sUdcUT0-BdTPto9P7BM372-HUv7HSn6Kgn6p1ylFbePaKfa1AK3H7l/exec/exec';
const API_TOKEN='SkyHi2026$ecure!';

const INVOICE_TABS={
  manager:[{id:'pending',icon:'📋',label:'Pending'},{id:'done',icon:'✅',label:'Reviewed'}],
  payment:[{id:'payment',icon:'💳',label:'To Pay'}],
  admin:[{id:'pending',icon:'📋',label:'Pending'},{id:'done',icon:'✅',label:'Reviewed'},{id:'payment',icon:'💳',label:'To Pay'},{id:'paid',icon:'💰',label:'Paid'}],
  viewer:[{id:'paid',icon:'💰',label:'Paid'}],
};
const MAINT_TABS={
  admin:[{id:'m_open',icon:'🔧',label:'Open'},{id:'m_all',icon:'📋',label:'All'},{id:'m_dash',icon:'📊',label:'Dashboard'}],
  dispatcher:[{id:'m_open',icon:'🔧',label:'Open'},{id:'m_all',icon:'📋',label:'All'},{id:'m_dash',icon:'📊',label:'Dashboard'}],
  fieldworker:[{id:'m_mine',icon:'🔧',label:'My Jobs'},{id:'m_all',icon:'📋',label:'All'}],
  viewer:[{id:'m_open',icon:'🔧',label:'Open'},{id:'m_dash',icon:'📊',label:'Dashboard'}],
  manager:[{id:'m_open',icon:'🔧',label:'Open'},{id:'m_dash',icon:'📊',label:'Dashboard'}],
  payment:[],
};
const ROLE_MODULES={
  admin:['invoices','maintenance'],dispatcher:['maintenance'],fieldworker:['maintenance'],
  manager:['invoices','maintenance'],viewer:['invoices','maintenance'],payment:['invoices'],
};

let currentUser=null,currentModule='invoices',currentTab='pending';
let invoices=[],tickets=[],ticketStats=null,allUsers=[],activeFilter='All',pendingAction=null,autoLogoutTimer=null;

// ─── UTILITIES ───
function fmt(a){return '$'+Number(a).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function ini(name){return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}
function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function escAttr(s){return esc(s)}
function filterChips(items,field){
  const vals=[...new Set(items.map(i=>String(i[field]||'Other')).filter(Boolean))].sort();
  if(vals.length<=1)return '';
  return '<div class="filters">'+['All',...vals].map(f=>{
    const safe=esc(f);
    return `<button class="chip${f===activeFilter?' active':''}" data-filter="${safe}" onclick="setFilter(this.dataset.filter)">${safe}</button>`;
  }).join('')+'</div>';
}
function setFilter(f){activeFilter=f;render();}

async function api(params){
  params.token=API_TOKEN;
  const url=SCRIPT_URL+'?'+new URLSearchParams(params);
  try{
    const res=await fetch(url,{redirect:'follow',mode:'cors'});
    const text=await res.text();
    try{return JSON.parse(text);}
    catch(e){const m=text.match(/\((.+)\)/s);if(m)return JSON.parse(m[1]);throw e;}
  }catch(err){console.error('API error:',err);throw err;}
}

// ─── AUTO LOGOUT ───
function resetAutoLogout(){
  if(autoLogoutTimer)clearTimeout(autoLogoutTimer);
  if(currentUser)autoLogoutTimer=setTimeout(()=>{alert('Session expired.');logout();},30*60*1000);
}
document.addEventListener('touchstart',resetAutoLogout,{passive:true});
document.addEventListener('click',resetAutoLogout);

// ─── REFRESH ───
async function doRefresh(){
  const btn=document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  if(currentModule==='invoices')await loadInvoices();
  else{await loadTickets();await loadTicketStats();}
  setTimeout(()=>btn.classList.remove('spinning'),500);
}

// ─── LOGIN ───
async function handleLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pin=document.getElementById('login-pin').value.trim();
  const errEl=document.getElementById('login-error');
  const btn=document.getElementById('btn-login');
  if(!email||!pin){errEl.textContent='Please enter both email/username and PIN';errEl.style.display='block';return;}
  if(pin.length!==8){errEl.textContent='PIN must be 8 digits';errEl.style.display='block';return;}
  btn.disabled=true;btn.textContent='Signing in...';errEl.style.display='none';
  try{
    const result=await api({action:'login',email,pin});
    if(result.success){
      currentUser={...result.user,init:ini(result.user.name)};
      document.getElementById('login-view').style.display='none';
      document.getElementById('main-view').style.display='block';
      const mods=ROLE_MODULES[currentUser.role]||['invoices'];
      currentModule=mods[0];
      document.getElementById('module-switch').style.display=mods.length>1?'flex':'none';
      setupModule();resetAutoLogout();loadUsers();
    }else{errEl.textContent=result.error||'Invalid credentials';errEl.style.display='block';}
  }catch(e){errEl.textContent='Connection error. Please try again.';errEl.style.display='block';}
  btn.disabled=false;btn.textContent='Sign In';
}
document.addEventListener('keydown',function(e){if(e.key==='Enter'&&document.getElementById('login-view').style.display!=='none')handleLogin();});

async function loadUsers(){try{const d=await api({action:'getUsers'});allUsers=Array.isArray(d)?d:[];}catch(e){allUsers=[];}}

function switchModule(mod){
  currentModule=mod;activeFilter='All';
  document.getElementById('mod-invoices').classList.toggle('active',mod==='invoices');
  document.getElementById('mod-maintenance').classList.toggle('active',mod==='maintenance');
  setupModule();
}

function setupModule(){
  if(currentModule==='invoices'){
    const tabs=INVOICE_TABS[currentUser.role]||INVOICE_TABS.manager;
    currentTab=currentUser.role==='payment'?'payment':currentUser.role==='viewer'?'paid':'pending';
    buildNav(tabs);loadInvoices();
  }else{
    const tabs=MAINT_TABS[currentUser.role]||MAINT_TABS.manager;
    currentTab=currentUser.role==='fieldworker'?'m_mine':'m_open';
    buildNav(tabs);loadTickets();loadTicketStats();
  }
}

function buildNav(tabs){
  const nav=document.getElementById('bottom-nav');
  const all=[...tabs,{id:'settings',icon:'⚙️',label:'Settings'}];
  nav.innerHTML=all.map(t=>`<button class="nav-btn${t.id===currentTab?' active':''}" id="nav-${t.id}" onclick="switchTab('${t.id}')"><span class="nav-icon">${t.icon}</span>${t.label}</button>`).join('');
}

function logout(){
  currentUser=null;currentTab='pending';currentModule='invoices';activeFilter='All';
  invoices=[];tickets=[];ticketStats=null;allUsers=[];
  if(autoLogoutTimer)clearTimeout(autoLogoutTimer);
  document.getElementById('login-email').value='';document.getElementById('login-pin').value='';
  document.getElementById('login-error').style.display='none';
  document.getElementById('login-view').style.display='flex';document.getElementById('main-view').style.display='none';
}

function switchTab(t){currentTab=t;activeFilter='All';
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const a=document.getElementById('nav-'+t);if(a)a.classList.add('active');render();
}

// ─── DATA LOADING ───
async function loadInvoices(){
  document.getElementById('main-content').innerHTML='<div class="loading">Loading invoices…</div>';
  try{const d=await api({action:'getInvoices'});invoices=Array.isArray(d)?d:[];updateHeader();render();}
  catch(e){document.getElementById('main-content').innerHTML='<div class="loading">Error loading. Tap ↻ to retry.</div>';}
}
async function loadTickets(){
  document.getElementById('main-content').innerHTML='<div class="loading">Loading tickets…</div>';
  try{const d=await api({action:'getTickets'});tickets=Array.isArray(d)?d:[];render();}
  catch(e){document.getElementById('main-content').innerHTML='<div class="loading">Error loading. Tap ↻ to retry.</div>';}
}
async function loadTicketStats(){try{ticketStats=await api({action:'getTicketStats'});}catch(e){ticketStats=null;}}

function updateHeader(){
  if(currentModule==='invoices'){
    const p=getPendingForUser();
    document.getElementById('header-title').textContent=currentUser.role==='payment'?'Payment Queue':'Invoices';
    const b=document.getElementById('header-badge');
    if((currentUser.role==='manager'||currentUser.role==='admin')&&p.length>0){b.textContent=p.length;b.style.display='';}else b.style.display='none';
  }else{document.getElementById('header-title').textContent='Maintenance';document.getElementById('header-badge').style.display='none';}
}

function getPendingForUser(){
  return invoices.filter(i=>{
    const s=String(i['Invoice Status']||'').toLowerCase();if(s!=='pending'&&s!=='')return false;
    const a=String(i['Assigned To']||'').trim();if(!a)return true;if(currentUser.role==='admin')return true;
    return a.toLowerCase()===currentUser.name.toLowerCase()||a.toLowerCase()===currentUser.email.toLowerCase();
  });
}

// ─── RENDER ───
function render(){
  const c=document.getElementById('main-content');if(!currentUser)return;
  if(currentTab==='pending')renderPending(c);
  else if(currentTab==='done')renderReviewed(c);
  else if(currentTab==='payment')renderPayment(c);
  else if(currentTab==='paid')renderPaid(c);
  else if(currentTab==='m_open')renderMaintOpen(c);
  else if(currentTab==='m_mine')renderMaintMine(c);
  else if(currentTab==='m_all')renderMaintAll(c);
  else if(currentTab==='m_dash')renderMaintDash(c);
  else if(currentTab==='settings')renderSettings(c);
}

function userHeader(sub){

function invoiceAge(d){if(!d)return '';const dt=new Date(d),now=new Date(),days=Math.floor((now-dt)/864e5);if(days<=0)return 'Today';if(days===1)return '1 day ago';if(days<=30)return days+' days ago';if(days<=60)return '1 month ago';return Math.floor(days/30)+' months ago';}
function priPill(p){const l=(p||'').toLowerCase();if(l==='emergency')return 'pill-red';if(l==='urgent')return 'pill-orange';if(l==='high')return 'pill-yellow';if(l==='medium')return 'pill-blue';return 'pill-gray';}
function priClass(p){const l=(p||'').toLowerCase();if(l==='emergency')return 'pri-emergency';if(l==='urgent')return 'pri-urgent';if(l==='high')return 'pri-high';if(l==='medium')return 'pri-medium';return 'pri-low';}
function statusPill(s){const l=(s||'').toLowerCase();if(l==='resolved'||l.includes('closed'))return 'pill-green';if(l==='in progress')return 'pill-blue';if(l.includes('pending'))return 'pill-yellow';return 'pill-gray';}

// ─── TICKET CARD ───
function ticketCard(t){
  const issueNum=String(t['Issue #']);
  const isAdmin=currentUser.role==='admin',isDisp=currentUser.role==='dispatcher',isWorker=currentUser.role==='fieldworker';
  const canStatus=isAdmin||isDisp||isWorker,canAssign=isAdmin||isDisp,canPriority=isAdmin||isDisp;
  const age=invoiceAge(t['Open Date']);
  let acts='';
  if(canStatus)acts+=`<button class="btn-action" data-issue="${escAttr(issueNum)}" onclick="openTicketStatusSheet(this.dataset.issue)">📝 Update Status</button>`;
  if(canAssign)acts+=`<button class="btn-action" data-issue="${escAttr(issueNum)}" onclick="openTicketAssignSheet(this.dataset.issue)">👤 Assign</button>`;
  if(canPriority)acts+=`<button class="btn-action" data-issue="${escAttr(issueNum)}" onclick="openTicketPrioritySheet(this.dataset.issue)">⚡ Priority</button>`;
  acts+=`<button class="btn-action" data-issue="${escAttr(issueNum)}" onclick="openTicketNoteSheet(this.dataset.issue)">💬 Add Note</button>`;

  const desc=esc(String(t['Description']||''));
  const notes=esc(String(t['NOTES']||''));
  const issue=esc(String(t['Issue']||t['Description']||'No description'));

  return `<div class="card">
    <div class="card-row"><div class="card-vendor">${issue.slice(0,80)}${issue.length>80?'…':''}</div><span class="pill ${priPill(t['Priority'])}">${esc(t['Priority']||'—')}</span></div>
    <div class="card-meta">#${esc(issueNum)} · ${esc(String(t['Open Date']||'').slice(0,10))}</div>
    ${age?`<div class="card-meta" style="color:#ca8a04">${age}</div>`:''}
    <div class="card-prop">📍 ${esc(t['Property']||'—')}${t['Unit']?' · '+esc(t['Unit']):''}</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">
      <span class="pill ${statusPill(t['Status'])}">${esc(t['Status']||'Open')}</span>
      <span class="card-meta" style="margin:0">${esc(t['Category']||'')}</span>
    </div>
    ${t['Assigned to']?`<div class="card-assign">👤 ${esc(t['Assigned to'])}</div>`:''}
    ${desc&&desc!==issue?`<div class="card-note" style="max-height:80px;overflow:hidden">${desc.slice(0,200)}${desc.length>200?'…':''}</div>`:''}
    ${notes?`<div class="card-note" style="border-top:1px solid #f0f0f0;padding-top:8px;margin-top:8px">📝 ${notes.slice(0,200)}${notes.length>200?'…':''}</div>`:''}
    <div class="btn-row">${acts}</div>
  </div>`;
}

function renderMaintAll(c){
  const filtered=activeFilter==='All'?tickets:tickets.filter(t=>(t['Status']||'Unknown')===activeFilter);
  let html=userHeader(`${tickets.length} total tickets`);
  html+=filterChips(tickets,'Status');
  if(!filtered.length){html+=`<div class="empty"><div class="empty-icon">📋</div><div class="empty-title">No tickets</div></div>`;}
  else filtered.forEach(t=>{html+=ticketCard(t);});
  c.innerHTML=html;
}

function renderMaintDash(c){
  if(!ticketStats){c.innerHTML='<div class="loading">Loading dashboard…</div>';return;}
  const s=ticketStats;
  const open=(s.byStatus['Open']||0)+(s.byStatus['In Progress']||0)+(s.byStatus['Pending']||0)+(s.byStatus['Pending Supervisor Approval']||0);
  const resolved=s.byStatus['Resolved']||0;
  let html=userHeader('Dashboard');
  html+=`<div class="summary"><div class="summary-item"><div class="summary-val">${s.total}</div><div class="summary-lbl">Total</div></div><div class="summary-item"><div class="summary-val" style="color:#ea580c">${open}</div><div class="summary-lbl">Open</div></div><div class="summary-item"><div class="summary-val" style="color:#1D9E75">${resolved}</div><div class="summary-lbl">Resolved</div></div></div>`;
  if(s.avgResolutionDays)html+=`<div class="dash-card"><div class="dash-title">⏱ Avg Resolution Time</div><div style="font-size:28px;font-weight:800;text-align:center;padding:10px 0">${s.avgResolutionDays} days</div></div>`;
  html+=`<div class="dash-card"><div class="dash-title">⚡ By Priority</div>`;
  ['Emergency','Urgent','High','Medium','Low'].forEach(p=>{if(s.byPriority[p])html+=`<div class="dash-row"><div class="dash-label ${priClass(p)}">${p}</div><div class="dash-value">${s.byPriority[p]}</div></div>`;});
  html+=`</div>`;
  html+=`<div class="dash-card"><div class="dash-title">📊 By Status</div>`;
  Object.entries(s.byStatus).sort((a,b)=>b[1]-a[1]).forEach(([k,v])=>{html+=`<div class="dash-row"><div class="dash-label">${esc(k)}</div><div class="dash-value">${v}</div></div>`;});
  html+=`</div>`;
  html+=`<div class="dash-card"><div class="dash-title">🏷 By Category</div>`;
  Object.entries(s.byCategory).sort((a,b)=>b[1]-a[1]).slice(0,10).forEach(([k,v])=>{html+=`<div class="dash-row"><div class="dash-label">${esc(k)}</div><div class="dash-value">${v}</div></div>`;});
  html+=`</div>`;
  html+=`<div class="dash-card"><div class="dash-title">👤 By Worker</div>`;
  Object.entries(s.byWorker).sort((a,b)=>b[1]-a[1]).slice(0,10).forEach(([k,v])=>{html+=`<div class="dash-row"><div class="dash-label">${esc(k)}</div><div class="dash-value">${v}</div></div>`;});
  html+=`</div>`;
  html+=`<div class="dash-card"><div class="dash-title">🏠 Top Properties</div>`;
  Object.entries(s.byProperty).sort((a,b)=>b[1]-a[1]).slice(0,10).forEach(([k,v])=>{html+=`<div class="dash-row"><div class="dash-label">${esc(k)}</div><div class="dash-value">${v}</div></div>`;});
  html+=`</div>`;
  c.innerHTML=html;
}

    <div class="input-group"><label class="input-label">Current PIN</label><input class="input-field" id="old-pin" type="password" inputmode="numeric" maxlength="8" placeholder="Enter current PIN"></div>
    <div class="input-group"><label class="input-label">New PIN (8 digits)</label><input class="input-field" id="new-pin" type="password" inputmode="numeric" maxlength="8" placeholder="Enter new PIN"></div>
    <div class="input-group"><label class="input-label">Confirm New PIN</label><input class="input-field" id="confirm-pin" type="password" inputmode="numeric" maxlength="8" placeholder="Confirm new PIN"></div>
    <button class="btn-save" onclick="handleChangePin()">Save New PIN</button>
    <div class="pin-msg" id="pin-msg"></div></div></div>`;
  html+=`<div class="settings-card"><div class="settings-title">👤 Account Info</div><div style="font-size:15px;color:#666">
    <div style="margin-bottom:8px"><strong>Name:</strong> ${esc(currentUser.name)}</div>
    <div style="margin-bottom:8px"><strong>Email:</strong> ${esc(currentUser.email)}</div>
    <div><strong>Role:</strong> ${esc(currentUser.role)}</div></div></div>`;
  html+=`<div class="settings-card"><div class="settings-title">ℹ️ About</div><div style="font-size:14px;color:#888">SkyHi Management v4.0</div></div>`;
  c.innerHTML=html;
}

async function handleChangePin(){
  const oldPin=document.getElementById('old-pin').value.trim();
  const newPin=document.getElementById('new-pin').value.trim();
  const confirmPin=document.getElementById('confirm-pin').value.trim();
  if(!oldPin||!newPin||!confirmPin){showPinMsg('Please fill in all fields','err');return;}
  if(newPin.length!==8||!/^\d+$/.test(newPin)){showPinMsg('New PIN must be exactly 8 digits','err');return;}
  if(newPin!==confirmPin){showPinMsg('New PINs do not match','err');return;}
  try{const r=await api({action:'changePin',email:currentUser.email,oldPin,newPin});
    if(r.success){showPinMsg('PIN changed successfully! ✓','ok');document.getElementById('old-pin').value='';document.getElementById('new-pin').value='';document.getElementById('confirm-pin').value='';}
    else showPinMsg(r.error||'Failed','err');
  }catch(e){showPinMsg('Connection error.','err');}
}
function showPinMsg(text,type){
  const el=document.getElementById('pin-msg');el.textContent=text;
  el.className='pin-msg '+(type==='ok'?'pin-ok':'pin-err');el.style.display='block';
  setTimeout(()=>{el.style.display='none';},4000);
}

document.getElementById('main-view').style.display='none';
document.getElementById('login-view').style.display='flex';
