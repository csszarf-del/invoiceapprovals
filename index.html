<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Invoices">
<meta name="theme-color" content="#ffffff">
<title>Invoice Approvals</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow-x:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;max-width:100vw}
.header{background:#fff;padding:16px 20px;display:flex;align-items:center;border-bottom:1px solid #ebebeb;position:sticky;top:0;z-index:10}
.header h1{font-size:20px;font-weight:800;flex:1}
.badge{background:#ff3b30;color:#fff;font-size:13px;font-weight:700;padding:4px 10px;border-radius:20px}
.header-refresh{background:none;border:none;font-size:20px;cursor:pointer;padding:4px 8px;color:#1D9E75}
.header-refresh.spinning{animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #ebebeb;display:flex;justify-content:center;align-items:center;gap:6px;padding:10px 12px calc(10px + env(safe-area-inset-bottom));z-index:20}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;padding:10px 16px;border-radius:16px;color:#999;font-size:12px;font-weight:600;transition:all 0.15s;min-width:70px}
.nav-btn.active{background:#f0faf5;color:#1D9E75}
.nav-icon{font-size:24px;line-height:1}
.login-wrap{min-height:100vh;display:flex;flex-direction:column;width:100%}
.login-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 16px;gap:20px;width:100%}
.login-emoji{font-size:64px;line-height:1}
.login-body h2{font-size:28px;font-weight:800}
.login-body p{font-size:16px;color:#888;margin-top:-8px}
.login-form{width:100%;max-width:400px;display:flex;flex-direction:column;gap:14px}
.input-group{display:flex;flex-direction:column;gap:6px}
.input-label{font-size:14px;font-weight:600;color:#555}
.input-field{width:100%;padding:16px;border:1.5px solid #ebebeb;border-radius:14px;font-size:16px;font-family:inherit;color:#1a1a1a;background:#fff}
.input-field:focus{outline:none;border-color:#1D9E75}
.input-field::placeholder{color:#bbb}
.btn-login{width:100%;padding:18px;background:#1D9E75;color:#fff;border:none;border-radius:14px;font-size:18px;font-weight:800;cursor:pointer;margin-top:6px}
.btn-login:active{background:#178a64}
.btn-login:disabled{background:#ccc;cursor:not-allowed}
.login-error{background:#fff0f0;color:#ff3b30;padding:12px 16px;border-radius:12px;font-size:14px;font-weight:600;text-align:center;display:none}
.page{padding:16px 16px 110px;width:100%}
.user-header{display:flex;align-items:center;gap:12px;margin-bottom:18px;background:#fff;padding:16px;border-radius:20px;box-shadow:0 1px 4px rgba(0,0,0,0.06);width:100%}
.user-av{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;flex-shrink:0}
.user-name{font-size:17px;font-weight:800}
.user-sub{font-size:13px;color:#888;margin-top:2px}
.signout{margin-left:auto;font-size:13px;color:#888;background:#f5f5f5;border:none;border-radius:10px;padding:9px 14px;cursor:pointer;font-weight:600;white-space:nowrap}
.card{background:#fff;border-radius:22px;padding:20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,0.06);width:100%}
.card-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.card-vendor{font-size:18px;font-weight:800;flex:1;padding-right:10px;line-height:1.3}
.card-amount{font-size:20px;font-weight:800;white-space:nowrap}
.card-meta{font-size:14px;color:#999;margin-bottom:4px}
.card-prop{font-size:15px;color:#666;margin-bottom:14px}
.card-note{font-size:14px;color:#999;font-style:italic;margin-bottom:12px}
.card-assign{font-size:13px;color:#3b5bdb;margin-bottom:10px;font-weight:600}
.btn-row{display:flex;flex-direction:column;gap:10px;width:100%}
.btn-approve{width:100%;padding:18px;background:#1D9E75;color:#fff;border:none;border-radius:14px;font-size:18px;font-weight:800;cursor:pointer}
.btn-approve:active{background:#178a64}
.btn-reject{width:100%;padding:18px;background:#fff;color:#ff3b30;border:1.5px solid #ebebeb;border-radius:14px;font-size:18px;font-weight:800;cursor:pointer}
.btn-reject:active{background:#fff0f0}
.btn-pdf{width:100%;padding:14px;background:#f5f5f5;color:#555;border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;display:block}
.btn-assign{width:100%;padding:14px;background:#eef3ff;color:#3b5bdb;border:none;border-radius:14px;font-size:15px;font-weight:600;cursor:pointer;text-align:center}
.btn-pay{width:100%;padding:18px;background:#fff;color:#1D9E75;border:2px solid #1D9E75;border-radius:14px;font-size:18px;font-weight:800;cursor:pointer;margin-top:12px}
.btn-pay:active{background:#1D9E75;color:#fff}
.pill{display:inline-flex;align-items:center;font-size:13px;font-weight:700;padding:6px 14px;border-radius:20px;gap:4px}
.pill-green{background:#e8faf3;color:#1D9E75}
.pill-red{background:#fff0f0;color:#ff3b30}
.pill-blue{background:#eef3ff;color:#3b5bdb}
.summary{background:#fff;border-radius:20px;padding:18px;margin-bottom:16px;display:flex;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.summary-item{flex:1;text-align:center}
.summary-val{font-size:22px;font-weight:800}
.summary-lbl{font-size:11px;color:#999;margin-top:4px;font-weight:600;text-transform:uppercase;letter-spacing:0.3px}
.filters{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px}
.chip{padding:10px 18px;background:#fff;border:1.5px solid #ebebeb;border-radius:20px;font-size:14px;font-weight:600;color:#888;cursor:pointer;white-space:nowrap}
.chip.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.approved-tag{font-size:14px;color:#888;margin-top:8px}
.empty{text-align:center;padding:80px 20px}
.empty-icon{font-size:56px;margin-bottom:16px}
.empty-title{font-size:22px;font-weight:800;margin-bottom:8px}
.empty-sub{font-size:16px;color:#aaa}
.loading{text-align:center;padding:80px 20px;font-size:17px;color:#aaa}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);display:flex;align-items:flex-end;z-index:50}
.sheet{background:#fff;border-radius:28px 28px 0 0;padding:28px 20px calc(40px + env(safe-area-inset-bottom));width:100%;max-height:85vh;overflow-y:auto}
.sheet-title{font-size:22px;font-weight:800;margin-bottom:6px}
.sheet-sub{font-size:16px;color:#888;margin-bottom:20px}
.sheet textarea,.sheet input,.sheet select{width:100%;border:1.5px solid #ebebeb;border-radius:16px;padding:16px;font-size:16px;font-family:inherit;resize:none;color:#1a1a1a;margin-bottom:12px;background:#fff;-webkit-appearance:none;appearance:none}
.sheet textarea{height:100px}
.sheet textarea:focus,.sheet input:focus,.sheet select:focus{outline:none;border-color:#1a1a1a}
.sheet-btns{display:flex;gap:10px}
.btn-confirm-approve{flex:1;padding:18px;background:#1D9E75;color:#fff;border:none;border-radius:14px;font-size:18px;font-weight:800;cursor:pointer}
.btn-confirm-reject{flex:1;padding:18px;background:#fff0f0;color:#ff3b30;border:none;border-radius:14px;font-size:18px;font-weight:800;cursor:pointer}
.btn-cancel{padding:18px 20px;background:#f5f5f5;color:#888;border:none;border-radius:14px;font-size:16px;font-weight:600;cursor:pointer}
.settings-card{background:#fff;border-radius:20px;padding:20px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.settings-title{font-size:16px;font-weight:700;margin-bottom:14px}
.settings-row{display:flex;flex-direction:column;gap:10px}
.btn-save{width:100%;padding:16px;background:#1D9E75;color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:700;cursor:pointer;margin-top:6px}
.btn-save:active{background:#178a64}
.pin-msg{padding:12px;border-radius:12px;font-size:14px;font-weight:600;text-align:center;margin-top:10px;display:none}
.pin-ok{background:#e8faf3;color:#1D9E75}
.pin-err{background:#fff0f0;color:#ff3b30}
.user-pick{padding:14px;border:1.5px solid #ebebeb;border-radius:14px;background:#fff;cursor:pointer;font-size:15px;font-weight:600;text-align:left;width:100%;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.user-pick:active{background:#f5f5f5}
.user-pick .pick-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;background:#dbeafe;color:#1d4ed8;flex-shrink:0}
</style>
</head>
<body>

<div id="login-view" class="login-wrap">
  <div class="header"><h1>🏢 Invoice Approvals</h1></div>
  <div class="login-body">
 <img src="skyhi_logo (1).png" style="width:200px;height:auto" alt="Sky High Management">
    <h2>Sign In</h2>
    <p>Enter your email and PIN</p>
    <div class="login-form">
      <div class="input-group">
        <label class="input-label">Email</label>
        <input class="input-field" id="login-email" type="email" placeholder="you@skyhimanagement.com" autocomplete="email" autocapitalize="none">
      </div>
      <div class="input-group">
        <label class="input-label">PIN</label>
        <input class="input-field" id="login-pin" type="password" inputmode="numeric" placeholder="8-digit PIN" maxlength="8" autocomplete="off">
      </div>
      <div class="login-error" id="login-error"></div>
      <button class="btn-login" id="btn-login" onclick="handleLogin()">Sign In</button>
    </div>
  </div>
</div>

<div id="main-view" style="display:none;width:100%">
  <div class="header">
    <h1 id="header-title">Invoice Approvals</h1>
    <span class="badge" id="header-badge" style="display:none"></span>
    <button class="header-refresh" id="refresh-btn" onclick="doRefresh()">↻</button>
  </div>
  <div class="page" id="main-content"></div>
  <div class="bottom-nav" id="bottom-nav"></div>
</div>

<div class="overlay" id="overlay" style="display:none" onclick="overlayClick(event)">
  <div class="sheet" id="action-sheet"></div>
</div>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbxLzyEfalCYSpSgsjCyUxSeWYqFzUxdXzRSS0k7_fE8QFdTuciBEKvrMoRIVJTa4SXy/exec';

const ROLE_TABS={
  manager:[{id:'pending',icon:'📋',label:'Pending'},{id:'done',icon:'✅',label:'Reviewed'},{id:'settings',icon:'⚙️',label:'Settings'}],
  payment:[{id:'payment',icon:'💳',label:'To Pay'},{id:'settings',icon:'⚙️',label:'Settings'}],
  admin:[{id:'pending',icon:'📋',label:'Pending'},{id:'done',icon:'✅',label:'Reviewed'},{id:'payment',icon:'💳',label:'To Pay'},{id:'paid',icon:'💰',label:'Paid'},{id:'settings',icon:'⚙️',label:'Settings'}],
};

let currentUser=null,currentTab='pending',invoices=[],allUsers=[],activeFilter='All',pendingAction=null;
let autoLogoutTimer=null;

function fmt(a){return '$'+Number(a).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}
function initials(name){return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase()}

async function api(params){
  const url=SCRIPT_URL+'?'+new URLSearchParams(params);
  try{
    const res=await fetch(url,{redirect:'follow',mode:'cors'});
    const text=await res.text();
    try{return JSON.parse(text);}
    catch(e){const m=text.match(/\((.+)\)/s);if(m)return JSON.parse(m[1]);throw e;}
  }catch(err){console.error('API error:',err);throw err;}
}

// AUTO LOGOUT 30 MIN
function resetAutoLogout(){
  if(autoLogoutTimer)clearTimeout(autoLogoutTimer);
  if(currentUser){
    autoLogoutTimer=setTimeout(()=>{alert('Session expired. Please sign in again.');logout();},30*60*1000);
  }
}
document.addEventListener('touchstart',resetAutoLogout,{passive:true});
document.addEventListener('click',resetAutoLogout);
document.addEventListener('scroll',resetAutoLogout,{passive:true});

// REFRESH BUTTON IN HEADER
async function doRefresh(){
  const btn=document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  await loadInvoices();
  setTimeout(()=>btn.classList.remove('spinning'),500);
}

// LOGIN
async function handleLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pin=document.getElementById('login-pin').value.trim();
  const errEl=document.getElementById('login-error');
  const btn=document.getElementById('btn-login');
  if(!email||!pin){errEl.textContent='Please enter both email and PIN';errEl.style.display='block';return;}
  if(pin.length!==8){errEl.textContent='PIN must be 8 digits';errEl.style.display='block';return;}
  btn.disabled=true;btn.textContent='Signing in...';errEl.style.display='none';
  try{
    const result=await api({action:'login',email,pin});
    if(result.success){
      currentUser={...result.user,init:initials(result.user.name)};
      document.getElementById('login-view').style.display='none';
      document.getElementById('main-view').style.display='block';
      currentTab=currentUser.role==='payment'?'payment':'pending';
      buildNav();
      resetAutoLogout();
      loadUsers();
      loadInvoices();
    }else{
      errEl.textContent=result.error||'Invalid credentials';
      errEl.style.display='block';
    }
  }catch(e){
    errEl.textContent='Connection error. Please try again.';
    errEl.style.display='block';
  }
  btn.disabled=false;btn.textContent='Sign In';
}

document.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&document.getElementById('login-view').style.display!=='none')handleLogin();
});

async function loadUsers(){
  try{const data=await api({action:'getUsers'});allUsers=Array.isArray(data)?data:[];}
  catch(e){allUsers=[];}
}

function buildNav(){
  const nav=document.getElementById('bottom-nav');
  const tabs=ROLE_TABS[currentUser.role]||ROLE_TABS.manager;
  nav.innerHTML=tabs.map(t=>`
    <button class="nav-btn${t.id===currentTab?' active':''}" id="nav-${t.id}" onclick="switchTab('${t.id}')">
      <span class="nav-icon">${t.icon}</span>${t.label}
    </button>`).join('');
}

function logout(){
  currentUser=null;currentTab='pending';activeFilter='All';invoices=[];allUsers=[];
  if(autoLogoutTimer)clearTimeout(autoLogoutTimer);
  document.getElementById('login-email').value='';
  document.getElementById('login-pin').value='';
  document.getElementById('login-error').style.display='none';
  document.getElementById('login-view').style.display='flex';
  document.getElementById('main-view').style.display='none';
}

function switchTab(t){
  currentTab=t;activeFilter='All';
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const a=document.getElementById('nav-'+t);
  if(a)a.classList.add('active');
  render();
}

async function loadInvoices(){
  document.getElementById('main-content').innerHTML='<div class="loading">Loading invoices…</div>';
  try{
    const data=await api({action:'getInvoices'});
    invoices=Array.isArray(data)?data:[];
    updateHeader();
    render();
  }catch(e){
    document.getElementById('main-content').innerHTML='<div class="loading">Error loading. Tap ↻ to retry.</div>';
  }
}

function updateHeader(){
  const pending=getPendingForUser();
  const n=pending.length;
  document.getElementById('header-title').textContent=currentUser.role==='payment'?'Payment Queue':'Invoice Approvals';
  const b=document.getElementById('header-badge');
  if((currentUser.role==='manager'||currentUser.role==='admin')&&n>0){b.textContent=n;b.style.display='';}
  else b.style.display='none';
}

function getPendingForUser(){
  return invoices.filter(i=>{
    const s=String(i['Invoice Status']||'').toLowerCase();
    if(s!=='pending'&&s!=='')return false;
    const assigned=String(i['Assigned To']||'').trim();
    if(!assigned)return true;
    if(currentUser.role==='admin')return true;
    return assigned.toLowerCase()===currentUser.name.toLowerCase()||assigned.toLowerCase()===currentUser.email.toLowerCase();
  });
}

function openActionSheet(num,action){
  const inv=invoices.find(i=>String(i['#'])===String(num));
  pendingAction={num,action};
  document.getElementById('action-sheet').innerHTML=`
    <div class="sheet-title">${action==='approve'?'Approve invoice':'Reject invoice'}</div>
    <div class="sheet-sub">${inv['Payee (Vendor, Supplier, Contractor)']} · ${fmt(inv['Invoice Amt'])}</div>
    <textarea id="sheet-note" placeholder="Add a note (optional)…"></textarea>
    <div class="sheet-btns">
      <button class="btn-cancel" onclick="closeSheet()">Cancel</button>
      <button class="${action==='approve'?'btn-confirm-approve':'btn-confirm-reject'}" onclick="confirmAction()">✓ ${action==='approve'?'Approve':'Reject'}</button>
    </div>`;
  document.getElementById('overlay').style.display='flex';
}

function openPaySheet(num){
  const inv=invoices.find(i=>String(i['#'])===String(num));
  pendingAction={num,action:'pay'};
  document.getElementById('action-sheet').innerHTML=`
    <div class="sheet-title">Mark as paid</div>
    <div class="sheet-sub">${inv['Payee (Vendor, Supplier, Contractor)']} · ${fmt(inv['Invoice Amt'])}</div>
    <label class="input-label" style="margin-bottom:6px">Payment Method</label>
    <select id="pay-method">
      <option value="">Select method...</option>
      <option value="Check">Check</option>
      <option value="ACH">ACH</option>
      <option value="Wire">Wire</option>
      <option value="Credit Card">Credit Card</option>
      <option value="Zelle">Zelle</option>
      <option value="Cash">Cash</option>
      <option value="Other">Other</option>
    </select>
    <div class="sheet-btns">
      <button class="btn-cancel" onclick="closeSheet()">Cancel</button>
      <button class="btn-confirm-approve" onclick="confirmPay()">✓ Mark Paid</button>
    </div>`;
  document.getElementById('overlay').style.display='flex';
}

function openAssignSheet(num){
  const inv=invoices.find(i=>String(i['#'])===String(num));
  const managers=allUsers.filter(u=>u.role==='manager'||u.role==='admin');
  let userHtml=`<button class="user-pick" onclick="doAssign('${num}','')">
    <div class="pick-av" style="background:#f5f5f5;color:#999">✕</div>
    <div>Unassign (visible to all)</div>
  </button>`;
  managers.forEach(u=>{
    const i=initials(u.name);
    userHtml+=`<button class="user-pick" onclick="doAssign('${num}','${u.name}')">
      <div class="pick-av">${i}</div>
      <div>${u.name}</div>
    </button>`;
  });
  document.getElementById('action-sheet').innerHTML=`
    <div class="sheet-title">Assign invoice</div>
    <div class="sheet-sub">${inv['Payee (Vendor, Supplier, Contractor)']} · ${fmt(inv['Invoice Amt'])}</div>
    ${userHtml}`;
  document.getElementById('overlay').style.display='flex';
}

function overlayClick(e){if(e.target===document.getElementById('overlay'))closeSheet();}
function closeSheet(){document.getElementById('overlay').style.display='none';pendingAction=null;}

async function confirmAction(){
  if(!pendingAction)return;
  const note=document.getElementById('sheet-note').value.trim();
  const{num,action}=pendingAction;
  closeSheet();
  document.getElementById('main-content').innerHTML='<div class="loading">Saving…</div>';
  try{
    await api({action:action==='approve'?'approveInvoice':'rejectInvoice',rowNum:num,managerName:currentUser.name,note});
    const inv=invoices.find(i=>String(i['#'])===String(num));
    if(inv){inv['Invoice Status']=action==='approve'?'Approved':'Rejected';inv['Invoice Approved By']=currentUser.name;inv['Notes']=note||inv['Notes'];}
    updateHeader();render();
  }catch(e){alert('Error saving. Please try again.');render();}
}

async function confirmPay(){
  if(!pendingAction)return;
  const method=document.getElementById('pay-method').value;
  if(!method){alert('Please select a payment method');return;}
  const{num}=pendingAction;
  closeSheet();
  document.getElementById('main-content').innerHTML='<div class="loading">Saving…</div>';
  try{
    await api({action:'markPaid',rowNum:num,method});
    const inv=invoices.find(i=>String(i['#'])===String(num));
    if(inv){inv['Invoice Status']='Paid';inv['Payment Date']=new Date().toLocaleDateString();inv['Payment Method']=method;}
    render();
  }catch(e){alert('Error marking as paid.');render();}
}

async function doAssign(num,name){
  closeSheet();
  document.getElementById('main-content').innerHTML='<div class="loading">Assigning…</div>';
  try{
    await api({action:'assignInvoice',rowNum:num,assignTo:name});
    const inv=invoices.find(i=>String(i['#'])===String(num));
    if(inv)inv['Assigned To']=name;
    updateHeader();render();
  }catch(e){alert('Error assigning.');render();}
}

function setFilter(f){activeFilter=f;render();}

function render(){
  const c=document.getElementById('main-content');
  if(!currentUser)return;
  if(currentTab==='payment'){renderPayment(c);return;}
  if(currentTab==='paid'){renderPaid(c);return;}
  if(currentTab==='pending'){renderPending(c);return;}
  if(currentTab==='done'){renderReviewed(c);return;}
  if(currentTab==='settings'){renderSettings(c);return;}
}

function userHeader(sub){
  const colors={admin:'background:#fef9c3;color:#ca8a04',manager:'background:#dbeafe;color:#1d4ed8',payment:'background:#dcfce7;color:#16a34a'};
  return `<div class="user-header">
    <div class="user-av" style="${colors[currentUser.role]}">${currentUser.init}</div>
    <div><div class="user-name">${currentUser.name}</div><div class="user-sub">${sub}</div></div>
    <button class="signout" onclick="logout()">Sign out</button>
  </div>`;
}

function invoiceAge(dateStr){
  if(!dateStr)return '';
  const d=new Date(dateStr);
  const now=new Date();
  const days=Math.floor((now-d)/(1000*60*60*24));
  if(days<=0)return 'Today';
  if(days===1)return '1 day ago';
  if(days<=30)return days+' days ago';
  if(days<=60)return '1 month ago';
  return Math.floor(days/30)+' months ago';
}

function renderPending(c){
  const pending=getPendingForUser();
  const types=[...new Set(pending.map(i=>i['Expense Type']||'Other').filter(Boolean))].sort();
  const filters=types.length>1?['All',...types]:[];
  const filtered=activeFilter==='All'?pending:pending.filter(i=>(i['Expense Type']||'Other')===activeFilter);
  let html=userHeader(`${pending.length} pending · ${fmt(pending.reduce((s,i)=>s+Number(i['Invoice Amt']||0),0))}`);
  if(filters.length)html+=`<div class="filters">`+filters.map(f=>`<button class="chip${f===activeFilter?' active':''}" onclick="setFilter('${f}')">${f}</button>`).join('')+`</div>`;
  if(!filtered.length){
    html+=`<div class="empty"><div class="empty-icon">✅</div><div class="empty-title">All caught up!</div><div class="empty-sub">No pending invoices${activeFilter!=='All'?' in this category':''}.</div></div>`;
  }else{
    filtered.forEach(inv=>{
      const num=inv['#'];
      const prop=[inv['Property'],inv['Unit']].filter(Boolean).join(' · ');
      const pdf=inv['Invoice PDF Link'];
      const age=invoiceAge(inv['Invoice Date']);
      const assigned=String(inv['Assigned To']||'').trim();
      html+=`<div class="card">
        <div class="card-row"><div class="card-vendor">${inv['Payee (Vendor, Supplier, Contractor)']||'—'}</div><div class="card-amount">${fmt(inv['Invoice Amt'])}</div></div>

        <div class="card-prop">📍 ${prop||'—'}${inv['Expense Type']?' · '+inv['Expense Type']:''}</div>
        ${assigned?`<div class="card-assign">👤 Assigned to ${assigned}</div>`:''}
        ${inv['Notes']?`<div class="card-note">${inv['Notes']}</div>`:''}

    });

  c.innerHTML=html;

async function handleChangePin(){
  const oldPin=document.getElementById('old-pin').value.trim();
  const newPin=document.getElementById('new-pin').value.trim();
  const confirmPin=document.getElementById('confirm-pin').value.trim();
  if(!oldPin||!newPin||!confirmPin){showPinMsg('Please fill in all fields','err');return;}
  if(newPin.length!==8||!/^\d+$/.test(newPin)){showPinMsg('New PIN must be exactly 8 digits','err');return;}
  if(newPin!==confirmPin){showPinMsg('New PINs do not match','err');return;}
  try{
    const result=await api({action:'changePin',email:currentUser.email,oldPin,newPin});
    if(result.success){
      showPinMsg('PIN changed successfully! ✓','ok');
      document.getElementById('old-pin').value='';
      document.getElementById('new-pin').value='';
      document.getElementById('confirm-pin').value='';
    }else{showPinMsg(result.error||'Failed to change PIN','err');}
  }catch(e){showPinMsg('Connection error. Please try again.','err');}
}

function showPinMsg(text,type){
  const el=document.getElementById('pin-msg');
  el.textContent=text;
  el.className='pin-msg '+(type==='ok'?'pin-ok':'pin-err');
  el.style.display='block';
  setTimeout(()=>{el.style.display='none';},4000);
}

document.getElementById('main-view').style.display='none';
document.getElementById('login-view').style.display='flex';
